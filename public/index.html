<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能 PPT 生成器</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { text-align: center; color: #0F172A; }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #E2E8F0; }
        .tab { padding: 12px 24px; cursor: pointer; font-weight: bold; color: #64748B; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab.active { color: #0EA5E9; border-bottom-color: #0EA5E9; }
        
        .panel { display: none; }
        .panel.active { display: block; }

        /* Upload Styles */
        .upload-area { border: 2px dashed #CBD5E1; padding: 60px; border-radius: 12px; cursor: pointer; text-align: center; background-color: #F8FAFC; transition: all 0.3s ease; }
        .upload-area:hover { border-color: #0EA5E9; background-color: #F0F9FF; }
        #status { margin-top: 20px; color: #64748B; text-align: center; }

        /* Chat Styles */
        .chat-container { border: 1px solid #E2E8F0; border-radius: 12px; height: 500px; display: flex; flex-direction: column; overflow: hidden; background: #fff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #F8FAFC; }
        .message { margin-bottom: 15px; max-width: 80%; line-height: 1.5; }
        .message.system { margin-right: auto; background: #E0F2FE; color: #0369A1; padding: 12px 16px; border-radius: 12px 12px 12px 0; }
        .message.user { margin-left: auto; background: #0EA5E9; color: white; padding: 12px 16px; border-radius: 12px 12px 0 12px; }
        
        .chat-input-area { display: flex; padding: 15px; background: white; border-top: 1px solid #E2E8F0; align-items: center; gap: 10px; }
        .chat-input-area input[type="text"] { flex: 1; padding: 12px 16px; border: 1px solid #CBD5E1; border-radius: 8px; font-size: 15px; outline: none; }
        .chat-input-area input[type="text"]:focus { border-color: #0EA5E9; }
        
        .chat-input-wrapper { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        
        .attached-file { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #F0F9FF; border: 1px solid #BAE6FD; border-radius: 8px; font-size: 13px; color: #0369A1; }
        .attached-file .file-icon { font-size: 16px; }
        .attached-file .file-name { flex: 1; }
        .attached-file .remove-file { cursor: pointer; color: #EF4444; font-weight: bold; }
        .attached-file .remove-file:hover { color: #DC2626; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: all 0.3s ease; }
        .btn-primary { background: #0EA5E9; color: white; }
        .btn-primary:hover { background: #0284C7; }
        .btn-primary:disabled { background: #94A3B8; cursor: not-allowed; }
        .btn-icon { padding: 10px 14px; background: #F1F5F9; color: #64748B; }
        .btn-icon:hover { background: #E2E8F0; color: #0EA5E9; }
        
        .input-row { display: flex; gap: 8px; align-items: center; }
        
        .download-btn { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #10B981; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; }
        .download-btn:hover { background: #059669; }
        
        .file-list { padding: 8px 12px; background: #F8FAFC; border-top: 1px solid #E2E8F0; display: flex; flex-wrap: wrap; gap: 8px; }
        .file-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: #E0F2FE; border-radius: 20px; font-size: 13px; color: #0369A1; }
        .file-chip .remove { cursor: pointer; font-weight: bold; color: #EF4444; }
        .file-chip .remove:hover { color: #DC2626; }

        /* Outline Preview Styles */
        .outline-card { background: #FFFBEB; border: 1px solid #FCD34D; border-radius: 10px; padding: 16px; margin-top: 10px; }
        .outline-card h3 { margin: 0 0 8px 0; color: #92400E; font-size: 16px; }
        .outline-card .outline-meta { font-size: 13px; color: #78716C; margin-bottom: 12px; line-height: 1.6; }
        .outline-card .outline-slide { margin-bottom: 10px; padding: 10px; background: white; border-radius: 8px; border: 1px solid #E5E7EB; }
        .outline-card .outline-slide .slide-header { font-weight: bold; color: #1E293B; font-size: 14px; margin-bottom: 4px; }
        .outline-card .outline-slide .slide-key { font-size: 12px; color: #0369A1; font-style: italic; margin-bottom: 4px; }
        .outline-card .outline-slide .slide-bullet { font-size: 13px; color: #475569; padding-left: 12px; line-height: 1.5; }
        .outline-actions { display: flex; gap: 10px; margin-top: 14px; }
        .outline-actions .btn-confirm { padding: 10px 24px; background: #10B981; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .outline-actions .btn-confirm:hover { background: #059669; }
        .outline-actions .btn-edit { padding: 10px 24px; background: #F1F5F9; color: #334155; border: 1px solid #CBD5E1; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .outline-actions .btn-edit:hover { background: #E2E8F0; }
    </style>
</head>
<body>
    <h1>AI 智能 PPT 生成器</h1>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('chat')">AI 对话生成 (New ✨)</div>
        <div class="tab" onclick="switchTab('upload')">文档上传生成</div>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel" class="panel active">
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <div class="message system">您好！我是 AI 演示文稿专家。我会通过几轮对话了解您的需求，生成大纲供您确认后，再为您制作最终的 PPT。<br><br>您可以直接上传文档（支持 .docx, .pdf, .md 格式），或者告诉我您想做什么主题的 PPT？</div>
            </div>
            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <div id="file-list" class="file-list" style="display: none;"></div>
                    <div class="input-row">
                        <input type="text" id="chat-input" placeholder="输入您的回答或上传文档..." onkeypress="handleKeyPress(event)">
                        <label class="btn btn-icon" title="添加附件">
                            <input type="file" id="chat-file-input" style="display: none;" accept=".docx,.pdf,.md,.png,.jpg,.jpeg" onchange="handleFileSelect(event)">
                            📎
                        </label>
                        <button id="send-btn" class="btn btn-primary" onclick="sendMessage()">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Upload Panel -->
    <div id="upload-panel" class="panel">
        <p style="text-align: center; color: #64748B;">上传 .md, .docx, 或 .pdf 文件，系统将自动提炼大纲并生成排版精美的 PPT。</p>
        <div class="upload-area" id="drop-zone">
            <h3 style="margin-bottom: 10px; color: #0F172A;">点击或拖拽文件到这里</h3>
            <p style="margin: 0; font-size: 14px;">支持 Markdown, Word, PDF 格式</p>
            <input type="file" id="file-input" style="display: none;" accept=".md,.docx,.pdf">
        </div>
        <div id="status"></div>
    </div>

    <script>
        // --- Tab Switching Logic ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            if (tabId === 'chat') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('chat-panel').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('upload-panel').classList.add('active');
            }
        }

        // --- Upload Logic ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#0EA5E9'; };
        dropZone.ondragleave = (e) => { e.preventDefault(); dropZone.style.borderColor = '#CBD5E1'; };
        dropZone.ondrop = (e) => { 
            e.preventDefault(); 
            dropZone.style.borderColor = '#CBD5E1';
            if (e.dataTransfer.files.length) {
                handleFileUpload(e.dataTransfer.files[0]);
            }
        };

        fileInput.onchange = (e) => {
            if (e.target.files.length) handleFileUpload(e.target.files[0]);
        };

        async function handleFileUpload(file) {
            status.innerText = '正在使用大模型提炼大纲与生成配图，请耐心等待（约需30-60秒）...';
            const formData = new FormData();
            formData.append('file', file);
            formData.append('plannerMode', 'creative');

            try {
                const response = await fetch('/generate-ppt', { method: 'POST', body: formData });
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.name.split('.')[0] + '-AI生成.pptx';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    status.innerHTML = '<span style="color: #10B981; font-weight: bold;">✅ PPT 生成成功并开始下载！</span>';
                } else {
                    status.innerHTML = '<span style="color: #EF4444;">❌ 生成失败: ' + (await response.text()) + '</span>';
                }
            } catch (err) {
                status.innerHTML = '<span style="color: #EF4444;">❌ 错误: ' + err.message + '</span>';
            }
        }

        // --- Chat Logic ---
        let chatHistory = [];
        let attachedFiles = [];
        const messagesContainer = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const fileListEl = document.getElementById('file-list');
        const chatFileInput = document.getElementById('chat-file-input');

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (['png', 'jpg', 'jpeg', 'gif', 'webp'].includes(ext)) return '🖼️';
            if (['docx', 'doc'].includes(ext)) return '📄';
            if (['pdf'].includes(ext)) return '📕';
            if (['md', 'markdown'].includes(ext)) return '📝';
            return '📎';
        }

        function renderFileList() {
            if (attachedFiles.length === 0) {
                fileListEl.style.display = 'none';
                return;
            }
            fileListEl.style.display = 'flex';
            fileListEl.innerHTML = attachedFiles.map((file, idx) => `
                <div class="file-chip">
                    <span>${getFileIcon(file.name)}</span>
                    <span>${file.name}</span>
                    <span class="remove" onclick="removeFile(${idx})">✕</span>
                </div>
            `).join('');
        }

        function removeFile(idx) {
            attachedFiles.splice(idx, 1);
            renderFileList();
        }

        window.removeFile = removeFile;

        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (!attachedFiles.find(f => f.name === file.name)) {
                    attachedFiles.push(file);
                }
            });
            renderFileList();
            e.target.value = '';
        }

        window.handleFileSelect = handleFileSelect;

        function appendMessage(role, content, downloadUrl = null, outlineData = null) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            if (role === 'user' && attachedFiles.length > 0) {
                div.innerHTML = `<div style="margin-bottom: 8px;">${escapeHtml(content)}</div>`;
                div.innerHTML += attachedFiles.map(f => 
                    `<div style="font-size: 12px; opacity: 0.8;">📎 ${escapeHtml(f.name)}</div>`
                ).join('');
            } else {
                div.innerText = content;
            }

            if (outlineData) {
                const card = document.createElement('div');
                card.className = 'outline-card';
                let html = `<h3>📋 PPT 大纲预览</h3>`;
                html += `<div class="outline-meta">`;
                if (outlineData.title) html += `<strong>标题：</strong>${escapeHtml(outlineData.title)}<br>`;
                if (outlineData.brief?.deckGoal) html += `<strong>目标：</strong>${escapeHtml(outlineData.brief.deckGoal)}<br>`;
                if (outlineData.brief?.audience) html += `<strong>受众：</strong>${escapeHtml(outlineData.brief.audience)}<br>`;
                if (outlineData.brief?.style) html += `<strong>风格：</strong>${escapeHtml(outlineData.brief.style)}`;
                html += `</div>`;
                outlineData.slides.forEach((slide, idx) => {
                    html += `<div class="outline-slide">`;
                    html += `<div class="slide-header">第${idx + 1}页：${escapeHtml(slide.title)}</div>`;
                    if (slide.keyMessage) html += `<div class="slide-key">💡 ${escapeHtml(slide.keyMessage)}</div>`;
                    slide.bullets.forEach(b => {
                        html += `<div class="slide-bullet">• ${escapeHtml(b)}</div>`;
                    });
                    html += `</div>`;
                });
                html += `<div class="outline-actions">`;
                html += `<button class="btn-confirm" onclick="confirmOutline()">✅ 确认生成 PPT</button>`;
                html += `<button class="btn-edit" onclick="editOutline()">✏️ 我想调整</button>`;
                html += `</div>`;
                card.innerHTML = html;
                div.appendChild(card);
            }
            
            if (downloadUrl) {
                div.innerHTML += `<br><br><a href="${downloadUrl}" class="download-btn" target="_blank">📥 点击下载生成的 PPT</a>`;
            }
            
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function confirmOutline() {
            chatInput.value = '确认生成，请开始生成PPT';
            sendMessage();
        }

        function editOutline() {
            chatInput.value = '';
            chatInput.placeholder = '请输入您想调整的内容，比如"第3页去掉"、"增加一页关于xxx的内容"...';
            chatInput.focus();
        }

        window.confirmOutline = confirmOutline;
        window.editOutline = editOutline;

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        window.handleKeyPress = handleKeyPress;

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text && attachedFiles.length === 0) return;

            const formData = new FormData();
            
            if (text) {
                formData.append('text', text);
            }
            
            attachedFiles.forEach(file => {
                formData.append('files', file);
            });
            
            formData.append('messages', JSON.stringify(chatHistory));

            appendMessage('user', text || '(发送了文件)');
            chatHistory.push({ role: 'user', content: text || '(发送了文件)' });
            
            chatInput.value = '';
            chatInput.disabled = true;
            sendBtn.disabled = true;
            attachedFiles = [];
            renderFileList();
            
            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message system';
            loadingDiv.id = loadingId;
            loadingDiv.innerText = '正在思考... (如果开始生成 PPT 可能需要 30-60 秒)';
            messagesContainer.appendChild(loadingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (response.ok) {
                    appendMessage('system', data.reply, data.downloadUrl, data.outlineData);
                    // 保存大纲原始文本到历史（含 outline 标记，供后端判断阶段）
                    let historyContent = data.reply;
                    if (data.outlineData) {
                        historyContent += '\n```outline\n' + formatOutlineForHistory(data.outlineData) + '\n```';
                    }
                    chatHistory.push({ role: 'assistant', content: historyContent });
                } else {
                    appendMessage('system', '❌ 请求失败: ' + (data.error || '未知错误'));
                }
            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage('system', '❌ 网络错误: ' + err.message);
            } finally {
                chatInput.disabled = false;
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        function formatOutlineForHistory(outline) {
            let text = '';
            if (outline.title) text += `标题：${outline.title}\n`;
            if (outline.brief?.deckGoal) text += `目标：${outline.brief.deckGoal}\n`;
            if (outline.brief?.audience) text += `受众：${outline.brief.audience}\n`;
            if (outline.brief?.style) text += `风格：${outline.brief.style}\n`;
            text += '\n';
            outline.slides.forEach((slide, idx) => {
                text += `第${idx + 1}页 ${slide.title}\n`;
                if (slide.keyMessage) text += `  核心观点：${slide.keyMessage}\n`;
                slide.bullets.forEach(b => { text += `  - ${b}\n`; });
                text += '\n';
            });
            return text;
        }

        window.sendMessage = sendMessage;
    </script>
</body>
</html>
